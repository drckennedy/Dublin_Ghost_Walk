      setSpeaking(true);
    }
  }, []);

  var speak = useCallback(function(text) {
    stopAll();
    setTtsError("");
    if (audioCacheRef.current[text]) {
      playCached(audioCacheRef.current[text]);
      return;
    }
    setTtsLoading(true);
    fetchAudio(text).then(function(url) {
      setTtsLoading(false);
      playCached(url);
    }).catch(function(e) {
      setTtsLoading(false);
      setTtsError("Voice fetch failed: " + (e.message || "unknown"));
    });
  }, [stopAll, fetchAudio, playCached]);

  useEffect(function() { stopAll(); }, [stopIdx, phase, screen, stopAll]);

  useEffect(function() {
    if (!teamNum) return;
    var r = ["start"].concat(ROUTES[teamNum]).concat(["end"]);
    var cur = LOCS[r[stopIdx]];
    if (!cur || (phase !== "clue" && phase !== "ghost")) return;
    var txt = phase === "clue" ? cur.clue : cur.ghost;
    if (audioCacheRef.current[txt]) return;
    fetchAudio(txt).catch(function(err) { console.warn("Prefetch failed:", err.message); });
  }, [teamNum, stopIdx, phase, fetchAudio]);

  var route = teamNum ? ["start"].concat(ROUTES[teamNum]).concat(["end"]) : [];
  var locId = route[stopIdx] || null;
  var loc = locId ? LOCS[locId] : null;
  var isLast = stopIdx === route.length - 1;
  function addPenalty(s) { setPenaltySec(function(p) { return p + s; }); }

  function beginHunt() {
    setStopIdx(0); setPhase("clue"); setHintLevel(0); setGuess(""); setFeedback(null);
    setGpsStatus("idle"); setGpsMsg(""); setShowOverride(false); setDistM(null);
    setStartMs(Date.now()); setPenaltySec(0); setElapsedMs(0); setFinalSec(null);
    audioCacheRef.current = {};
    setScreen("hunt");
  }

  function submitGuess() {
    if (!guess.trim()) return;
    if (checkAnswer(guess, locId)) {
      setPhase("traveling"); setFeedback({ type: "correct" });
    } else {
      if (hintLevel === 0) { addPenalty(120); setHintLevel(1); setFeedback({ type: "wrong", penalty: 120, msg: "Not quite! Here's your first hint." }); }
      else if (hintLevel === 1) { addPenalty(120); setHintLevel(2); setFeedback({ type: "wrong", penalty: 120, msg: "Still not right! One final hint." }); }
      else { addPenalty(600); setHintLevel(3); setFeedback({ type: "revealed" }); setTimeout(function() { setPhase("traveling"); }, 2000); }
      setGuess("");
    }
  }

  function handleCheckIn() {
    setGpsStatus("checking"); setGpsMsg(""); setShowOverride(false); setDistM(null);
    if (!navigator.geolocation) { setGpsStatus("fail"); setGpsMsg("GPS not available on this device."); setShowOverride(true); return; }
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var d = haversine(pos.coords.latitude, pos.coords.longitude, loc.lat, loc.lng);
        setDistM(Math.round(d));
        if (d <= 50) { confirmArrival(); }
        else { setGpsStatus("fail"); setGpsMsg("You're about " + Math.round(d) + "m away — get a bit closer and try again!"); setShowOverride(true); }
      },
      function(err) {
        setGpsStatus("fail");
        setGpsMsg(err.code === 1 ? "Location access denied. Enable GPS or use manual check-in." : "Couldn't get your location. Try again or check in manually.");
        setShowOverride(true);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  function confirmArrival() {
    setGpsStatus("ok");
    setTimeout(function() { setPhase("ghost"); setGpsStatus("idle"); }, 700);
  }

  function nextStop() {
    if (stopIdx + 1 >= route.length) { setFinalSec(Math.floor(elapsedMs / 1000) + penaltySec); setScreen("complete"); return; }
    setStopIdx(function(i) { return i + 1; });
    setPhase("clue"); setHintLevel(0); setGuess(""); setFeedback(null);
    setGpsStatus("idle"); setGpsMsg(""); setShowOverride(false); setDistM(null);
  }

  if (screen === "splash") {
    return (
      <div style={{ minHeight: "100vh", background: "radial-gradient(ellipse at 50% 25%,#1a1a2a," + C.bg + " 65%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ textAlign: "center", maxWidth: 380 }}>
          <div style={{ fontSize: 64, marginBottom: 4, filter: "drop-shadow(0 0 24px rgba(201,168,76,.5))" }}>👻</div>
          <h1 style={{ fontFamily: Fd, fontSize: 50, fontWeight: 900, color: C.gold, lineHeight: 1.05, margin: "0 0 6px", letterSpacing: -1 }}>
            Shadows<br/><em style={{ fontWeight: 400, fontSize: 26, color: C.muted }}>of</em><br/>Dublin
          </h1>
          <div style={{ color: C.goldDim, fontSize: 13, letterSpacing: 12, margin: "14px 0" }}>☘ ☘ ☘</div>
          <p style={{ fontFamily: Fd, fontSize: 16, fontStyle: "italic", color: C.text, margin: "6px 0 4px" }}>A Haunted Walking Scavenger Hunt</p>
          <p style={{ fontFamily: Fm, fontSize: 11, color: C.muted, margin: "0 0 28px", letterSpacing: 0.5 }}>St. Stephen's Green → Trinity College</p>
          <button style={Btn.gold} onClick={function() { setScreen("setup"); }}>Begin the Hunt</button>
          <p style={{ fontSize: 12, color: C.muted, marginTop: 18, lineHeight: 1.7 }}>6 teams · 7 haunted stops<br/>Read clues · Guess destinations · Unlock ghost stories</p>
        </div>
      </div>
    );
  }

  if (screen === "setup") {
    return (
      <div style={{ minHeight: "100vh", background: C.bg, padding: "20px 20px 56px", maxWidth: 460, margin: "0 auto" }}>
        <button style={Btn.back} onClick={function() { setScreen("splash"); }}>← Back</button>
        <h2 style={{ fontFamily: Fd, fontSize: 26, fontWeight: 700, color: C.gold, margin: "0 0 8px" }}>Assemble Your Team</h2>
        <p style={{ color: C.muted, fontSize: 14, lineHeight: 1.7, margin: "0 0 24px" }}>Choose your team number and give yourselves a name worthy of the spirits you're about to encounter.</p>
        <label style={lbl}>Team Number</label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", gap: 8, marginBottom: 20 }}>
          {[1,2,3,4,5,6].map(function(n) {
            return <button key={n} style={teamNum === n ? Btn.teamOn : Btn.team} onClick={function() { setTeamNum(n); }}>{n}</button>;
          })}
        </div>
        <label style={lbl}>Team Name</label>
        <input style={inpStyle} placeholder="e.g. The Banshee Chasers" value={teamName} onChange={function(e) { setTeamName(e.target.value); }} maxLength={30}/>
        <button style={Object.assign({}, Btn.gold, { marginTop: 24, opacity: teamNum && teamName.trim() ? 1 : 0.4, pointerEvents: teamNum && teamName.trim() ? "auto" : "none" })} onClick={beginHunt}>
          Start the Hunt 👻
        </button>
      </div>
    );
  }

  if (screen === "complete") {
    return (
      <div style={{ minHeight: "100vh", background: "radial-gradient(ellipse at 50% 30%,#0e1f0e," + C.bg + " 65%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ textAlign: "center", maxWidth: 380 }}>
          <div style={{ fontSize: 68, marginBottom: 12 }}>🏆</div>
          <h1 style={{ fontFamily: Fd, fontSize: 38, fontWeight: 700, color: C.gold, margin: "0 0 6px" }}>Hunt Complete!</h1>
          <p style={{ fontFamily: Fd, fontSize: 18, fontStyle: "italic", color: C.text, margin: "0 0 4px" }}>{teamName}</p>
          <div style={{ color: C.success, fontSize: 13, letterSpacing: 10, margin: "14px 0" }}>☘ ☘ ☘</div>
          <div style={Object.assign({}, cardStyle, { margin: "0 0 16px" })}>
            <p style={{ fontFamily: Fm, fontSize: 11, color: C.muted, margin: "0 0 4px", textTransform: "uppercase", letterSpacing: 1 }}>Final Time</p>
            <p style={{ fontFamily: Fm, fontSize: 46, fontWeight: 700, color: C.text, margin: 0 }}>{fmt(finalSec !== null ? finalSec : totalSec)}</p>
            {penaltySec > 0 && <p style={{ fontFamily: Fm, fontSize: 12, color: C.warn, margin: "6px 0 0" }}>includes {fmt(penaltySec)} in time penalties</p>}
          </div>
          <p style={{ fontSize: 14, color: C.muted, lineHeight: 1.8 }}>You've walked the haunted streets of Dublin and lived to tell the tale.</p>
        </div>
      </div>
    );
  }

  if (!loc) return null;
  var stopNum = stopIdx + 1;
  var totalStops = route.length;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: "16px 16px 56px", maxWidth: 520, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, paddingBottom: 14, borderBottom: "1px solid " + C.border }}>
        <div>
          <p style={{ fontFamily: Fd, fontSize: 16, fontWeight: 700, color: C.gold, margin: 0 }}>{teamName}</p>
          <p style={{ fontFamily: Fm, fontSize: 11, color: C.muted, margin: "2px 0 0" }}>Stop {stopNum} of {totalStops}</p>
        </div>
        <div style={{ textAlign: "right" }}>
          <p style={{ fontFamily: Fm, fontSize: 10, color: C.muted, margin: 0, textTransform: "uppercase", letterSpacing: 1 }}>Time</p>
          <p style={{ fontFamily: Fm, fontSize: 24, fontWeight: 700, color: penaltySec > 0 ? C.warn : C.text, margin: 0 }}>{fmt(totalSec)}</p>
          {penaltySec > 0 && <p style={{ fontFamily: Fm, fontSize: 10, color: C.warn, margin: 0 }}>+{fmt(penaltySec)} penalties</p>}
        </div>
      </div>

      <div style={{ height: 4, background: C.border, borderRadius: 2, marginBottom: 22, overflow: "hidden" }}>
        <div style={{ height: "100%", width: ((stopIdx / (totalStops - 1)) * 100) + "%", background: "linear-gradient(90deg," + C.goldDim + "," + C.gold + ")", transition: "width .6s" }}/>
      </div>

      {ttsError && (
        <div style={{ background: C.dangerBg, border: "1px solid " + C.danger + "44", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: C.danger, fontFamily: Fm, lineHeight: 1.5 }}>
          🔊 {ttsError}
        </div>
      )}

      {phase === "clue" && (
        <div>
          <div style={Object.assign({}, cardStyle, { marginBottom: 14 })}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={Object.assign({}, tagStyle, { margin: 0, color: C.goldDim })}>📜 Clue — Stop {stopNum} of {totalStops}</span>
              <ListenBtn text={loc.clue} speaking={speaking} loading={ttsLoading} onSpeak={speak} onStop={stopAll}/>
            </div>
            <p style={{ fontSize: 15, lineHeight: 1.85, color: C.text, margin: 0 }}>{loc.clue}</p>
          </div>
          {hintLevel >= 1 && (
            <div style={{ background: C.warnBg, border: "1px solid " + C.warn + "44", borderRadius: 10, padding: 16, marginBottom: 12 }}>
              <span style={Object.assign({}, tagStyle, { color: C.warn })}>💡 Hint 1 of 2</span>
              <p style={{ fontSize: 14, color: C.text, margin: 0, lineHeight: 1.7 }}>{loc.hint1}</p>
            </div>
          )}
          {hintLevel >= 2 && (
            <div style={{ background: C.warnBg, border: "1px solid " + C.warn + "66", borderRadius: 10, padding: 16, marginBottom: 12 }}>
              <span style={Object.assign({}, tagStyle, { color: C.warn })}>💡 Hint 2 of 2 (final)</span>
              <p style={{ fontSize: 14, color: C.text, margin: 0, lineHeight: 1.7 }}>{loc.hint2}</p>
            </div>
          )}
          {hintLevel === 3 && (
            <div style={{ background: "rgba(201,148,76,.18)", border: "1px solid " + C.warn, borderRadius: 10, padding: 16, marginBottom: 12, textAlign: "center" }}>
              <p style={{ fontFamily: Fd, fontSize: 18, fontWeight: 700, color: C.warn, margin: "0 0 4px" }}>📍 Answer: {loc.name}</p>
              <p style={{ fontFamily: Fm, fontSize: 12, color: C.muted, margin: 0 }}>+10:00 penalty added · Proceeding in a moment…</p>
            </div>
          )}
          {feedback && feedback.type === "wrong" && (
            <div style={{ background: C.dangerBg, border: "1px solid " + C.danger + "44", borderRadius: 8, padding: "10px 14px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
              <p style={{ color: C.danger, fontSize: 13, margin: 0, lineHeight: 1.5 }}>{feedback.msg}</p>
              <span style={{ fontFamily: Fm, fontSize: 12, color: C.danger, fontWeight: 700, whiteSpace: "nowrap" }}>+{fmt(feedback.penalty)}</span>
            </div>
          )}
          {hintLevel < 3 && (
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <input style={Object.assign({}, inpStyle, { flex: 1 })} placeholder="Where are you going?" value={guess} onChange={function(e) { setGuess(e.target.value); }} onKeyDown={function(e) { if (e.key === "Enter") submitGuess(); }}/>
              <button style={Object.assign({}, Btn.gold, { width: "auto", padding: "12px 20px", fontSize: 14, flexShrink: 0 })} onClick={submitGuess}>Go</button>
            </div>
          )}
          {hintLevel > 0 && hintLevel < 3 && (
            <p style={{ fontSize: 12, color: C.muted, margin: "8px 0 0", fontStyle: "italic", textAlign: "center" }}>
              {hintLevel === 1 ? "1 hint used · 1 remaining · 1 more wrong reveals answer (+10:00)" : "2 hints used · 1 more wrong reveals the location (+10:00)"}
            </p>
          )}
        </div>
      )}

      {phase === "traveling" && (
        <div>
          <div style={{ background: "linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.04))", border: "1px solid " + C.gold + "55", borderRadius: 14, padding: "22px 20px", marginBottom: 14, textAlign: "center" }}>
            <div style={{ fontSize: 48, marginBottom: 8 }}>{loc.emoji}</div>
            <span style={Object.assign({}, tagStyle, { color: C.goldDim, display: "block" })}>{hintLevel === 3 ? "📍 Destination Revealed" : "✅ Correct! Head to"}</span>
            <h2 style={{ fontFamily: Fd, fontSize: 26, fontWeight: 700, color: C.gold, margin: "0 0 4px" }}>{loc.name}</h2>
            {loc.subtitle && <p style={{ fontFamily: Fm, fontSize: 12, color: C.muted, margin: "0 0 8px" }}>{loc.subtitle}</p>}
            {hintLevel === 3 && <p style={{ fontFamily: Fm, fontSize: 11, color: C.warn, margin: 0 }}>+10:00 penalty applied</p>}
          </div>
          <button style={Object.assign({}, Btn.muted, { marginBottom: 10 })} onClick={function() { window.open("https://www.google.com/maps/dir/?api=1&destination=" + loc.lat + "," + loc.lng + "&travelmode=walking", "_blank"); }}>
            🗺️ Get Walking Directions
          </button>
          <div style={cardStyle}>
            <p style={{ fontFamily: Fm, fontSize: 11, color: C.muted, margin: "0 0 12px", textTransform: "uppercase", letterSpacing: 1 }}>👁 Check in when you arrive to unlock the ghost story</p>
            <button
              style={Object.assign({}, Btn.gold, { background: gpsStatus === "ok" ? C.success : "transparent", borderColor: gpsStatus === "ok" ? C.success : C.gold, color: gpsStatus === "ok" ? "#000" : C.gold })}
              onClick={handleCheckIn}
              disabled={gpsStatus === "checking" || gpsStatus === "ok"}>
              {gpsStatus === "checking" ? "📡 Checking GPS…" : gpsStatus === "ok" ? "✅ Location Confirmed!" : "📍 I'm Here — Check In"}
            </button>
            {gpsStatus === "fail" && (
              <div>
                <p style={{ color: C.danger, fontSize: 13, margin: "10px 0 2px", lineHeight: 1.5 }}>{gpsMsg}</p>
                {distM && <p style={{ fontFamily: Fm, fontSize: 11, color: C.muted, margin: "2px 0 0" }}>Detected distance: ~{distM}m</p>}
              </div>
            )}
            {showOverride && (
              <button style={Object.assign({}, Btn.warn, { marginTop: 10 })} onClick={function() { setShowOverride(false); confirmArrival(); }}>
                ✋ Manual Check-In (I'm standing here)
              </button>
            )}
          </div>
        </div>
      )}

      {phase === "ghost" && (
        <div>
          <div style={{ background: C.purpleBg, border: "1px solid " + C.purple + "44", borderRadius: 12, padding: 20, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={Object.assign({}, tagStyle, { margin: 0, color: C.purple })}>👻 Ghost Story — {loc.name}</span>
              <ListenBtn text={loc.ghost} speaking={speaking} loading={ttsLoading} onSpeak={speak} onStop={stopAll}/>
            </div>
            <p style={{ fontSize: 15, lineHeight: 1.85, color: C.text, margin: 0 }}>{loc.ghost}</p>
          </div>
          <button style={Btn.gold} onClick={nextStop}>
            {isLast ? "🏆 Finish the Hunt" : "Next Clue →"}
          </button>
        </div>
      )}
    </div>
  );
}

var loadingEl = document.getElementById("loading");
if (loadingEl) loadingEl.remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
