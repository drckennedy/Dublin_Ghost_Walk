function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ─── PNG Certificate Generator ───
function generateCertificatePNG(teamName, teamNumber, totalTime, route, onReady) {
  const W = 1200, H = 1600;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(W / 2, H * 0.3, 100, W / 2, H / 2, H * 0.8);
  grad.addColorStop(0, "#1a1a28"); grad.addColorStop(1, "#0a0a0f");
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = "#c9a84c"; ctx.lineWidth = 4; ctx.strokeRect(40, 40, W - 80, H - 80);
  ctx.strokeStyle = "rgba(201,168,76,0.3)"; ctx.lineWidth = 1; ctx.strokeRect(52, 52, W - 104, H - 104);

  [[60,60],[W-60,60],[60,H-60],[W-60,H-60]].forEach(([cx, cy]) => {
    ctx.fillStyle = "#c9a84c"; ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2); ctx.fill();
  });

  const shamrocks = (y) => { ctx.fillStyle = "rgba(201,168,76,0.5)"; ctx.font = "20px serif"; ctx.textAlign = "center"; ctx.fillText("☘       ☘       ☘", W / 2, y); };

  ctx.font = "80px serif"; ctx.textAlign = "center"; ctx.fillText("👻", W / 2, 160);
  ctx.fillStyle = "#c9a84c"; ctx.font = "bold 64px Georgia, serif"; ctx.fillText("Shadows of Dublin", W / 2, 250);
  ctx.fillStyle = "#8a8677"; ctx.font = "italic 24px Georgia, serif"; ctx.fillText("A Haunted Walking Scavenger Hunt", W / 2, 295);
  shamrocks(340);
  ctx.fillStyle = "#4cc96a"; ctx.font = "bold 42px Georgia, serif"; ctx.fillText("HUNT COMPLETE", W / 2, 400);
  ctx.font = "60px serif"; ctx.fillText("🏆", W / 2, 475);
  ctx.fillStyle = "#c9a84c"; ctx.font = "bold 48px Georgia, serif"; ctx.fillText(teamName, W / 2, 550);
  ctx.fillStyle = "#8a8677"; ctx.font = "20px monospace"; ctx.fillText("TEAM " + teamNumber, W / 2, 585);
  shamrocks(625);
  ctx.fillStyle = "#e8e4d9"; ctx.font = "22px monospace"; ctx.fillText("COMPLETION TIME", W / 2, 675);
  ctx.fillStyle = "#c9a84c"; ctx.font = "bold 72px monospace"; ctx.fillText(totalTime, W / 2, 755);
  shamrocks(800);
  ctx.fillStyle = "#8a8677"; ctx.font = "18px monospace"; ctx.textAlign = "center"; ctx.fillText("ROUTE COMPLETED", W / 2, 850);

  ctx.textAlign = "left";
  let y = 890;
  route.forEach((locId, i) => {
    const loc = LOCATIONS[locId];
    ctx.fillStyle = "#4cc96a"; ctx.font = "18px monospace"; ctx.fillText("✓", 120, y);
    ctx.fillStyle = "rgba(201,168,76,0.6)"; ctx.font = "16px monospace"; ctx.fillText(String(i + 1).padStart(2, "0"), 150, y);
    ctx.fillStyle = "#e8e4d9"; ctx.font = "20px Georgia, serif"; ctx.fillText(loc.emoji + "  " + loc.name, 185, y);
    if (loc.subtitle) { ctx.fillStyle = "#8a8677"; ctx.font = "14px monospace"; ctx.fillText(loc.subtitle, 215, y + 18); y += 48; } else { y += 42; }
  });

  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(201,168,76,0.3)"; ctx.font = "14px Georgia, serif";
  ctx.fillText("St. Stephen's Green  →  Trinity College Dublin", W / 2, H - 110);
  ctx.fillStyle = "#8a8677"; ctx.font = "italic 16px Georgia, serif";
  ctx.fillText("The spirits thank you for visiting... and hope you'll return.", W / 2, H - 75);
  const dateStr = new Date().toLocaleDateString("en-IE", { year: "numeric", month: "long", day: "numeric" });
  ctx.fillStyle = "rgba(201,168,76,0.4)"; ctx.font = "14px monospace"; ctx.fillText(dateStr, W / 2, H - 48);

  canvas.toBlob((blob) => onReady(blob), "image/png");
}

  const [gpsError, setGpsError] = useState("");
  const [distanceToTarget, setDistanceToTarget] = useState(null);
  const [showGpsOverride, setShowGpsOverride] = useState(false);
  const [startTime, setStartTime] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [completionTime, setCompletionTime] = useState(null);
  const [certificateURL, setCertificateURL] = useState(null);
  const [generatingCert, setGeneratingCert] = useState(false);

  useEffect(() => {
    if (!startTime || completionTime) return;
    const iv = setInterval(() => setElapsed(Date.now() - startTime), 1000);
    return () => clearInterval(iv);
  }, [startTime, completionTime]);

  useEffect(() => {
    if (!teamNumber || !teamName) return;
    (async () => {
      try {
        const res = await window.storage.get("team-" + teamNumber + "-state", true);
        if (res) {
          const st = JSON.parse(res.value);
          setVisited(st.visited || {});
          if (st.startTime) setStartTime(st.startTime);
          if (st.completionTime) { setCompletionTime(st.completionTime); setElapsed(st.completionTime - st.startTime); }
        }
      } catch {}
    })();
  }, [teamNumber, teamName]);

  const saveState = useCallback(async (nv, ns, nc) => {
    if (!teamNumber) return;
    try {
      await window.storage.set("team-" + teamNumber + "-state", JSON.stringify({ visited: nv, startTime: ns || startTime, completionTime: nc || completionTime, teamName }), true);
    } catch {}
  }, [teamNumber, startTime, completionTime, teamName]);

  const getRoute = () => teamNumber ? ["start", ...TEAM_ROUTES[teamNumber], "end"] : [];
  const getCurrentStopIndex = () => { const r = getRoute(); for (let i = 0; i < r.length; i++) { if (!visited[r[i]]) return i; } return r.length; };
  const isComplete = () => { const r = getRoute(); return r.length > 0 && r.every((id) => visited[id]); };

  const formatTime = (ms) => {
    const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return h + ":" + String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
  };

  const checkIn = (locId) => {
    setGpsStatus("checking"); setGpsError(""); setDistanceToTarget(null);
    const loc = LOCATIONS[locId];
    if (!navigator.geolocation) { setGpsStatus("fail"); setGpsError("Geolocation not supported. Use the manual check-in below."); setShowGpsOverride(true); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const dist = haversineDistance(pos.coords.latitude, pos.coords.longitude, loc.lat, loc.lng);
        setDistanceToTarget(Math.round(dist));
        if (dist <= CHECK_IN_RADIUS_METERS) { markVisited(locId); setGpsStatus("success"); }
        else { setGpsStatus("fail"); setGpsError("You're " + Math.round(dist) + "m away. Get within " + Math.round(CHECK_IN_RADIUS_METERS) + "m (≈25 ft) to check in."); setShowGpsOverride(true); }
      },
      (err) => { setGpsStatus("fail"); setGpsError(err.code === 1 ? "Location permission denied. Enable GPS or use manual check-in." : "Could not determine location. Try again or use manual check-in."); setShowGpsOverride(true); },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  };

  const markVisited = (locId) => {
    const now = Date.now(), nv = { ...visited, [locId]: now }, st = startTime || now;
    if (!startTime) setStartTime(st);
    setVisited(nv);
    const route = getRoute();
    if (route.every((id) => nv[id])) {
      setCompletionTime(now); setElapsed(now - st); saveState(nv, st, now);
      setTimeout(() => setScreen("complete"), 1200);
    } else { saveState(nv, st, null); }
  };

  const manualCheckIn = (locId) => { markVisited(locId); setGpsStatus("success"); setShowGpsOverride(false); };
  const openDirections = (loc) => { window.open("https://www.google.com/maps/dir/?api=1&destination=" + loc.lat + "," + loc.lng + "&travelmode=walking", "_blank"); };

  const downloadCertificate = () => {
    if (certificateURL) { triggerDL(certificateURL); return; }
    setGeneratingCert(true);
    generateCertificatePNG(teamName, teamNumber, formatTime(elapsed), getRoute(), (blob) => {
      const url = URL.createObjectURL(blob); setCertificateURL(url); setGeneratingCert(false); triggerDL(url);
    });
  };
  const triggerDL = (url) => { const a = document.createElement("a"); a.href = url; a.download = "shadows-of-dublin-" + teamName.replace(/\s+/g, "-").toLowerCase() + ".png"; document.body.appendChild(a); a.click(); document.body.removeChild(a); };

  const FL = <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />;

  // ─── SPLASH ───
  if (screen === "splash") return (
    <div style={st.splashWrap}>{FL}
      <div style={st.splashInner}>
        <div style={{ fontSize: 64, marginBottom: 8, filter: "drop-shadow(0 0 20px rgba(201,168,76,0.4))" }}>👻</div>
        <h1 style={st.title}>Shadows<br /><span style={st.titleOf}>of</span><br />Dublin</h1>
        <div style={st.divider}>☘ ☘ ☘</div>
        <p style={{ fontFamily: fonts.display, fontSize: 17, fontStyle: "italic", color: theme.text, margin: "8px 0" }}>A Haunted Walking Scavenger Hunt</p>
        <p style={st.mono13}>St. Stephen's Green → Trinity College</p>
        <button style={st.btn} onClick={() => setScreen("setup")} onMouseEnter={e => e.target.style.background = theme.accent} onMouseLeave={e => e.target.style.background = "transparent"}>Begin the Hunt</button>
        <p style={{ fontSize: 13, color: theme.textMuted, marginTop: 20 }}>6 teams · 15 haunted sites · 3 hours</p>
      </div>
    </div>
  );

  // ─── SETUP ───
  if (screen === "setup") return (
    <div style={st.page}>{FL}
      <div style={{ maxWidth: 440, margin: "0 auto", paddingTop: 20 }}>
        <button style={st.back} onClick={() => setScreen("splash")}>← Back</button>
        <h2 style={{ fontFamily: fonts.display, fontSize: 28, fontWeight: 700, color: theme.accent, margin: "0 0 8px" }}>Assemble Your Team</h2>
        <p style={{ color: theme.textMuted, fontSize: 14, lineHeight: 1.6, margin: "0 0 24px" }}>Choose your team number and give yourselves a name worthy of the spirits you're about to encounter.</p>
        <label style={st.label}>Team Number</label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 8 }}>
          {[1,2,3,4,5,6].map(n => <button key={n} style={{ ...st.teamBtn, ...(teamNumber === n ? { background: theme.accentGlow, borderColor: theme.accent, color: theme.accent } : {}) }} onClick={() => setTeamNumber(n)}>{n}</button>)}
        </div>
        <label style={st.label}>Team Name</label>
        <input style={st.input} placeholder="e.g. The Banshee Chasers" value={teamName} onChange={e => setTeamName(e.target.value)} maxLength={30} />
        {teamNumber && teamName.trim() && (
          <div style={{ marginTop: 16 }}>
            <p style={{ fontFamily: fonts.display, fontSize: 13, color: theme.textMuted, marginBottom: 8 }}>Your Route (6 haunted stops + start & finish):</p>
            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 6 }}>
              <span style={st.chip}>🌿 St. Stephen's Green</span><span style={st.arrow}>→</span>
              {TEAM_ROUTES[teamNumber].map(id => <span key={id}><span style={st.chip}>{LOCATIONS[id].emoji} {LOCATIONS[id].name}</span><span style={st.arrow}>→</span></span>)}
              <span style={st.chip}>📚 Trinity College</span>
            </div>
          </div>
        )}
        <button style={{ ...st.btn, marginTop: 24, opacity: teamNumber && teamName.trim() ? 1 : 0.4, pointerEvents: teamNumber && teamName.trim() ? "auto" : "none" }} onClick={() => { try { window.storage.set("team-" + teamNumber + "-name", teamName.trim(), true); } catch {} setScreen("hunt"); }} onMouseEnter={e => e.target.style.background = theme.accent} onMouseLeave={e => e.target.style.background = "transparent"}>Start the Hunt 👻</button>
      </div>
    </div>
  );

  // ─── STORY ───
  if (screen === "story" && storyLocation) {
    const loc = LOCATIONS[storyLocation], iv = !!visited[storyLocation], ci = getCurrentStopIndex(), route = getRoute(), isCur = route[ci] === storyLocation;
    return (
      <div style={st.page}>{FL}
        <div style={{ maxWidth: 500, margin: "0 auto" }}>
          <button style={st.back} onClick={() => { setScreen("hunt"); setStoryLocation(null); setGpsStatus("idle"); setGpsError(""); setShowGpsOverride(false); setDistanceToTarget(null); }}>← Route Map</button>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <span style={{ fontSize: 48, display: "block", marginBottom: 8 }}>{loc.emoji}</span>
            <h2 style={{ fontFamily: fonts.display, fontSize: 28, fontWeight: 700, color: theme.accent, margin: "0 0 4px" }}>{loc.name}</h2>
            {loc.subtitle && <p style={{ fontFamily: fonts.mono, fontSize: 13, color: theme.textMuted, margin: 0 }}>{loc.subtitle}</p>}
          </div>
          <div style={{ display: "flex", borderBottom: "1px solid " + theme.border, marginBottom: 20 }}>
            {["history", "ghost"].map(t => <button key={t} style={{ flex: 1, background: "none", border: "none", borderBottom: "2px solid " + (storyTab === t ? theme.accent : "transparent"), color: storyTab === t ? theme.accent : theme.textMuted, fontFamily: fonts.display, fontSize: 15, fontWeight: 600, padding: "10px 0", cursor: "pointer" }} onClick={() => setStoryTab(t)}>{t === "history" ? "📜 History" : "👻 Ghost Story"}</button>)}
          </div>
          <div style={{ background: theme.bgCard, border: "1px solid " + theme.border, borderRadius: 12, padding: 20, marginBottom: 20 }}>
            <p style={{ fontSize: 15, lineHeight: 1.75, color: theme.text, margin: 0, fontFamily: fonts.body }}>{storyTab === "history" ? loc.history : loc.ghost}</p>
          </div>
          {!iv && isCur && (
            <div style={{ textAlign: "center", padding: 16, background: theme.bgCard, border: "1px solid " + theme.border, borderRadius: 12 }}>
              <button style={{ fontFamily: fonts.display, fontSize: 16, fontWeight: 700, color: "#000", background: theme.accent, border: "none", padding: "14px 32px", borderRadius: 8, cursor: "pointer", width: "100%" }} onClick={() => checkIn(storyLocation)} disabled={gpsStatus === "checking"}>{gpsStatus === "checking" ? "📡 Checking GPS..." : "📍 Check In Here"}</button>
              {gpsStatus === "success" && <p style={{ color: theme.success, fontFamily: fonts.mono, fontSize: 14, marginTop: 12 }}>✅ Checked in! Location confirmed.</p>}
              {gpsStatus === "fail" && <p style={{ color: theme.danger, fontFamily: fonts.body, fontSize: 13, marginTop: 12, lineHeight: 1.5 }}>{gpsError}</p>}
              {distanceToTarget && gpsStatus === "fail" && <p style={{ fontFamily: fonts.mono, fontSize: 13, color: theme.textMuted, marginTop: 6 }}>📏 Distance: {distanceToTarget}m from target</p>}
              {showGpsOverride && gpsStatus === "fail" && <button style={{ fontFamily: fonts.body, fontSize: 14, color: theme.accent, background: "transparent", border: "1px solid " + theme.accentDim, padding: "10px 20px", borderRadius: 6, cursor: "pointer", marginTop: 12, width: "100%" }} onClick={() => manualCheckIn(storyLocation)}>✋ I'm here — Manual Check-in</button>}
              <button style={{ fontFamily: fonts.body, fontSize: 13, color: theme.textMuted, background: "transparent", border: "1px solid " + theme.border, padding: "10px 20px", borderRadius: 6, cursor: "pointer", marginTop: 10, width: "100%" }} onClick={() => openDirections(loc)}>🗺️ Get Walking Directions</button>
            </div>
          )}
          {iv && <div style={{ textAlign: "center", padding: 16, background: "rgba(76,201,106,0.1)", border: "1px solid " + theme.successDim, borderRadius: 12, color: theme.success, fontFamily: fonts.display, fontSize: 16, fontWeight: 600 }}>✅ Visited</div>}
          {!isCur && !iv && <div style={{ textAlign: "center", padding: 16, background: "rgba(255,255,255,0.03)", border: "1px solid " + theme.border, borderRadius: 12, color: theme.textMuted, fontFamily: fonts.body, fontSize: 14 }}>🔒 Complete earlier stops first</div>}
        </div>
      </div>
    );
  }

  // ─── COMPLETE ───
  if (screen === "complete") {
    const route = getRoute();
    return (
      <div style={st.splashWrap}>{FL}
        <div style={{ textAlign: "center", maxWidth: 480 }}>
          <div style={{ fontSize: 72, marginBottom: 16 }}>🏆</div>
          <h1 style={{ ...st.title, fontSize: 44 }}>Hunt Complete!</h1>
          <p style={{ fontFamily: fonts.display, fontSize: 22, fontStyle: "italic", color: theme.text, margin: "8px 0 4px" }}>{teamName}</p>
          <p style={{ fontFamily: fonts.mono, fontSize: 13, color: theme.textMuted, margin: "0 0 12px" }}>Team {teamNumber}</p>
          <div style={{ ...st.divider, color: theme.success, letterSpacing: 6 }}>☘ ☘ ☘</div>
          <p style={{ fontFamily: fonts.mono, fontSize: 13, color: theme.textMuted, margin: "8px 0 4px", textTransform: "uppercase", letterSpacing: 2 }}>Completion Time</p>
          <p style={{ fontFamily: fonts.mono, fontSize: 48, fontWeight: 700, color: theme.accent, margin: "0 0 16px", textShadow: "0 0 30px " + theme.accentGlow }}>{formatTime(elapsed)}</p>
          <div style={st.divider}>☘ ☘ ☘</div>
          <div style={{ textAlign: "left", background: theme.bgCard, border: "1px solid " + theme.border, borderRadius: 12, padding: "16px 20px", marginBottom: 24 }}>
            <p style={{ fontFamily: fonts.mono, fontSize: 11, color: theme.textMuted, margin: "0 0 10px", textTransform: "uppercase", letterSpacing: 1 }}>Route Completed</p>
            {route.map((locId, i) => {
              const loc = LOCATIONS[locId];
              return <div key={locId} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", borderBottom: i < route.length - 1 ? "1px solid " + theme.border : "none" }}>
                <span style={{ color: theme.success, fontFamily: fonts.mono, fontSize: 14, width: 20 }}>✓</span>
                <span style={{ fontFamily: fonts.mono, fontSize: 12, color: theme.accentDim, width: 22 }}>{String(i + 1).padStart(2, "0")}</span>
                <span style={{ fontFamily: fonts.display, fontSize: 14, color: theme.text }}>{loc.emoji} {loc.name}</span>
              </div>;
            })}
          </div>
          <button style={{ ...st.btn, width: "100%", marginBottom: 12, background: generatingCert ? theme.bgCard : "transparent" }} onClick={downloadCertificate} disabled={generatingCert} onMouseEnter={e => { if (!generatingCert) e.target.style.background = theme.accent; }} onMouseLeave={e => { if (!generatingCert) e.target.style.background = "transparent"; }}>
            {generatingCert ? "🎨 Creating Certificate..." : "📥 Download Certificate (PNG)"}
          </button>
          <button style={{ fontFamily: fonts.body, fontSize: 14, color: theme.textMuted, background: "transparent", border: "1px solid " + theme.border, padding: "12px 24px", borderRadius: 6, cursor: "pointer", width: "100%" }} onClick={() => setScreen("hunt")}>View Route Map</button>
          <p style={{ fontSize: 13, color: theme.textMuted, marginTop: 16, lineHeight: 1.6 }}>The spirits thank you for visiting... and hope you'll return.</p>
        </div>
      </div>
    );
  }

  // ─── HUNT ───
  const route = getRoute(), ci = getCurrentStopIndex(), progress = Object.keys(visited).length, total = route.length, done = isComplete();
  return (
    <div style={st.page}>{FL}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid " + theme.border }}>
        <div>
          <h2 style={{ fontFamily: fonts.display, fontSize: 22, fontWeight: 700, color: theme.accent, margin: 0 }}>{teamName}</h2>
          <p style={{ fontFamily: fonts.mono, fontSize: 12, color: theme.textMuted, margin: "4px 0 0" }}>Team {teamNumber}</p>
        </div>
        <div style={{ textAlign: "right" }}>
          <p style={{ fontFamily: fonts.mono, fontSize: 10, color: theme.textMuted, margin: 0, textTransform: "uppercase", letterSpacing: 1 }}>{completionTime ? "Final Time" : "Elapsed"}</p>
          <p style={{ fontFamily: fonts.mono, fontSize: 22, fontWeight: 700, color: completionTime ? theme.success : theme.text, margin: 0 }}>{startTime ? formatTime(elapsed) : "0:00:00"}</p>
        </div>
      </div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ height: 6, background: theme.border, borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", background: "linear-gradient(90deg, " + theme.accentDim + ", " + theme.accent + ")", borderRadius: 3, transition: "width 0.5s ease", width: (progress / total * 100) + "%" }} />
        </div>
        <p style={{ fontFamily: fonts.mono, fontSize: 12, color: theme.textMuted, margin: "6px 0 0", textAlign: "right" }}>{progress}/{total} locations visited</p>
      </div>
      <div style={{ display: "flex", flexDirection: "column" }}>
        {route.map((locId, i) => {
          const loc = LOCATIONS[locId], isV = !!visited[locId], isCur = i === ci && !done, isLocked = i > ci && !done;
          return (
            <div key={locId} style={{ position: "relative" }}>
              {i > 0 && <div style={{ position: "absolute", left: 19, top: -8, width: 2, height: 16, background: isV || isCur ? theme.accent : theme.border }} />}
              <button style={{ display: "flex", alignItems: "center", gap: 14, width: "100%", background: isCur ? theme.bgCardHover : theme.bgCard, border: "1px solid " + (isCur ? theme.accent : isV ? theme.successDim : theme.border), borderRadius: 10, padding: "14px 16px", marginBottom: 8, cursor: isLocked ? "default" : "pointer", textAlign: "left", fontFamily: fonts.body, opacity: isLocked ? 0.4 : isV ? 0.7 : 1, boxShadow: isCur ? "0 0 20px " + theme.accentGlow : "none", transition: "all 0.15s" }} onClick={() => { if (!isLocked) { setStoryLocation(locId); setStoryTab("history"); setGpsStatus("idle"); setGpsError(""); setShowGpsOverride(false); setDistanceToTarget(null); setScreen("story"); } }} disabled={isLocked}>
                <div style={{ width: 38, height: 38, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: fonts.mono, fontSize: 15, fontWeight: 700, flexShrink: 0, background: isV ? theme.success : isCur ? theme.accent : theme.border, color: isV || isCur ? "#000" : theme.textMuted }}>{isV ? "✓" : i + 1}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontSize: 15, fontWeight: 600, margin: 0, fontFamily: fonts.display, color: isLocked ? theme.textMuted : theme.text }}>{loc.emoji} {loc.name}</p>
                  {loc.subtitle && <p style={{ fontSize: 12, color: theme.textMuted, margin: "2px 0 0" }}>{loc.subtitle}</p>}
                  {isCur && <span style={{ display: "inline-block", marginTop: 6, fontSize: 10, fontFamily: fonts.mono, fontWeight: 700, color: "#000", background: theme.accent, padding: "2px 8px", borderRadius: 4, letterSpacing: 1 }}>NEXT STOP</span>}
                  {i === 0 && !isV && <span style={{ display: "inline-block", marginTop: 6, fontSize: 10, fontFamily: fonts.mono, fontWeight: 700, color: theme.accent, background: theme.accentGlow, padding: "2px 8px", borderRadius: 4, letterSpacing: 1 }}>START HERE</span>}
                  {i === route.length - 1 && <span style={{ display: "inline-block", marginTop: 6, fontSize: 10, fontFamily: fonts.mono, fontWeight: 700, color: theme.text, background: "rgba(255,255,255,0.1)", padding: "2px 8px", borderRadius: 4, letterSpacing: 1 }}>FINISH LINE</span>}
                </div>
                <span style={{ fontSize: 24, color: theme.accentDim, flexShrink: 0, opacity: isLocked ? 0.3 : 1 }}>{isLocked ? "🔒" : "›"}</span>
              </button>
            </div>
          );
        })}
      </div>
      {done && <button style={{ ...st.btn, margin: "24px auto", display: "block" }} onClick={() => setScreen("complete")} onMouseEnter={e => e.target.style.background = theme.accent} onMouseLeave={e => e.target.style.background = "transparent"}>🏆 View Results & Certificate</button>}
      <p style={{ textAlign: "center", fontSize: 12, color: theme.textMuted, marginTop: 16, fontStyle: "italic" }}>Tap any unlocked location to read its story and check in via GPS.</p>
    </div>
  );
}

const st = {
  splashWrap: { minHeight: "100vh", background: "radial-gradient(ellipse at 50% 30%, #1a1a28 0%, " + theme.bg + " 70%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: fonts.body },
  splashInner: { textAlign: "center", maxWidth: 440 },
  title: { fontFamily: fonts.display, fontSize: 52, fontWeight: 900, color: theme.accent, lineHeight: 1.05, margin: "8px 0 16px", letterSpacing: -1, textShadow: "0 0 40px " + theme.accentGlow },
  titleOf: { fontWeight: 400, fontStyle: "italic", fontSize: 28, color: theme.textMuted },
  divider: { color: theme.accentDim, fontSize: 14, letterSpacing: 12, margin: "16px 0" },
  mono13: { fontFamily: fonts.mono, fontSize: 13, color: theme.textMuted, margin: "8px 0 24px", letterSpacing: 0.5 },
  btn: { fontFamily: fonts.display, fontSize: 16, fontWeight: 700, color: theme.accent, background: "transparent", border: "2px solid " + theme.accent, padding: "14px 36px", borderRadius: 6, cursor: "pointer", letterSpacing: 1, transition: "all 0.2s" },
  page: { minHeight: "100vh", background: theme.bg, padding: "16px 16px 40px", fontFamily: fonts.body, color: theme.text, maxWidth: 520, margin: "0 auto" },
  back: { background: "none", border: "none", color: theme.accent, fontFamily: fonts.body, fontSize: 15, cursor: "pointer", padding: "8px 0", marginBottom: 12 },
  label: { display: "block", fontFamily: fonts.display, fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 8, marginTop: 20, letterSpacing: 0.5 },
  teamBtn: { fontFamily: fonts.mono, fontSize: 18, fontWeight: 700, color: theme.textMuted, background: theme.bgCard, border: "1px solid " + theme.border, borderRadius: 8, padding: "14px 0", cursor: "pointer", transition: "all 0.15s" },
  input: { width: "100%", boxSizing: "border-box", fontFamily: fonts.body, fontSize: 16, color: theme.text, background: theme.bgCard, border: "1px solid " + theme.border, borderRadius: 8, padding: "12px 16px", outline: "none" },
  chip: { fontSize: 12, color: theme.text, background: theme.bgCard, border: "1px solid " + theme.border, borderRadius: 20, padding: "4px 10px", whiteSpace: "nowrap" },
  arrow: { color: theme.accentDim, fontSize: 14 },
};


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
